fail_fast: false

repos:
  - repo: local
    hooks:
      - id: black-format
        name: black-format
        description: Mirrors the CI black-format job.
        entry: python -m black --exclude "examples"
        language: system
        types: [python]

      - id: pylint
        name: pylint
        description: Mirrors the CI pylint job. Ruleset is configured in pyproject.toml.
        entry: python -m pylint
        language: system
        types: [python]

      - id: requirements-check
        name: requirements-check
        description: Mirrors the CI requirements-check job.
        entry: scripts/check_requirements.sh
        language: system
        pass_filenames: false
        always_run: true

      - id: pip-audit
        name: pip-audit
        description: Mirrors the CI pip-audit job.
        entry: python -m pip_audit -r requirements.txt
        language: system
        pass_filenames: false
        always_run: true

      - id: bandit
        name: bandit
        description: Mirrors the CI bandit job.
        entry: python -m bandit -l -ii -s B404,B603
        language: system
        types: [python]
