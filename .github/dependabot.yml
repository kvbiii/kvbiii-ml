version: 2

multi-ecosystem-groups:
  all-dependencies:
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    patterns:
      - "*"
    multi-ecosystem-group: "all-dependencies"
    open-pull-requests-limit: 1
    rebase-strategy: "auto"
    commit-message:
      prefix: "ci"
    labels:
      - "github-actions"

  - package-ecosystem: "pip"
    directory: "/"
    patterns:
      - "*"
    multi-ecosystem-group: "all-dependencies"
    open-pull-requests-limit: 1
    rebase-strategy: "auto"
    commit-message:
      prefix: "build"
    labels:
      - "python"
